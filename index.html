<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Lab 9000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07070f;
      --bg-2:     #0c0c1e;
      --bg-3:     #111128;
      --surface:  rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.08);
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.16);
      --text:     #eef0f8;
      --text-2:   #7878a0;
      --text-3:   #3c3c58;

      /* Signature: acid lime × violet */
      --lime:     #c2ff00;
      --violet:   #7c3aed;
      --grad:     linear-gradient(135deg, #c2ff00 0%, #7c3aed 100%);
      --grad-rev: linear-gradient(135deg, #7c3aed 0%, #c2ff00 100%);

      /* Status palette */
      --s-frying: #ff6b35;
      --s-burner: #ffd60a;
      --s-marit:  #c084fc;
      --s-ice:    #22d3ee;
      --s-served: #4ade80;
      --s-scrap:  #52526a;
    }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 100% 50% at 50% -8%, rgba(124,58,237,0.18) 0%, transparent 65%),
        radial-gradient(rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 100%, 24px 24px;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea, select { font-family: inherit; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

    /* ─── HEADER ─── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,7,15,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--grad);
    }
    .header-inner {
      max-width: 1440px; margin: 0 auto;
      padding: 0.85rem 2rem;
      display: flex; align-items: center; gap: 2.5rem;
    }
    .logo {
      font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1.2; white-space: nowrap;
    }
    .logo-sub {
      font-size: 0.58rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-3);
      -webkit-text-fill-color: var(--text-3); display: block; margin-top: 2px;
    }
    .header-stats {
      display: flex; gap: 0.5rem; margin-left: auto;
    }
    .stat-pill {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.35rem 0.8rem; border-radius: 999px;
      border: 1px solid var(--border); background: var(--surface);
      font-size: 0.75rem; color: var(--text-2);
    }
    .stat-pill strong {
      font-weight: 700; color: var(--text);
      font-size: 0.85rem;
    }

    /* ─── MAIN ─── */
    .main { max-width: 1440px; margin: 0 auto; padding: 1.8rem 2rem 5rem; }

    /* ─── TOOLBAR ─── */
    .toolbar {
      display: flex; align-items: center; gap: 0.7rem;
      margin-bottom: 1.2rem; flex-wrap: wrap;
    }
    .btn-primary {
      background: var(--grad); color: #000; border: none;
      padding: 0.55rem 1.25rem; border-radius: 8px;
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.02em;
      transition: opacity .15s, box-shadow .15s, transform .15s;
      white-space: nowrap;
    }
    .btn-primary:hover {
      opacity: .88;
      box-shadow: 0 4px 24px rgba(194,255,0,.25), 0 0 40px rgba(124,58,237,.2);
      transform: translateY(-1px);
    }

    .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 260px; }
    .search-wrap svg {
      position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%);
      opacity: .25; pointer-events: none;
    }
    #search-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 0.5rem 0.8rem 0.5rem 2.2rem;
      border-radius: 8px; font-size: 0.82rem; transition: border-color .15s;
    }
    #search-input:focus { outline: none; border-color: var(--lime); }
    #search-input::placeholder { color: var(--text-3); }

    .spacer { flex: 1; }

    .sort-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .sort-wrap label { font-size: 0.7rem; color: var(--text-3); white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase; }
    #sort-select {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 0.5rem 0.8rem; border-radius: 8px; font-family: inherit;
      font-size: 0.8rem; cursor: pointer; transition: border-color .15s;
    }
    #sort-select:focus { outline: none; border-color: var(--violet); }

    /* ─── FILTER BAR ─── */
    .filter-bar {
      display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: flex-start;
    }
    .filter-group { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
    .filter-label {
      font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-3); white-space: nowrap; margin-right: 0.1rem;
    }
    .pill {
      padding: 0.25rem 0.75rem; border-radius: 999px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-2); font-family: inherit; font-size: 0.72rem; font-weight: 500;
      transition: all .15s; white-space: nowrap; line-height: 1.5;
    }
    .pill:hover { border-color: var(--border2); color: var(--text); background: var(--surface); }
    .pill.active {
      background: rgba(194,255,0,.1); border-color: rgba(194,255,0,.4);
      color: var(--lime); font-weight: 600;
    }

    /* ─── RESULTS COUNT ─── */
    .results-count {
      font-size: 0.72rem; color: var(--text-3); margin-bottom: 1rem;
      letter-spacing: 0.03em;
    }

    /* ─── GRID ─── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 1rem; }

    /* ─── CARD ─── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card {
      background:
        radial-gradient(ellipse 70% 35% at 50% 0%, color-mix(in srgb, var(--status-clr, #7c3aed) 8%, transparent), transparent 70%),
        var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 1.2rem;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      animation: cardIn .3s cubic-bezier(0.16,1,0.3,1) both;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--status-clr, var(--violet)) 0%, transparent 100%);
    }
    .card:hover {
      border-color: var(--border2);
      transform: translateY(-3px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 20px 60px rgba(0,0,0,0.5),
        0 4px 16px color-mix(in srgb, var(--status-clr, var(--violet)) 20%, transparent);
    }

    /* Card layout */
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.6rem; gap: 0.6rem; }
    .card-title { font-size: 1.02rem; font-weight: 700; line-height: 1.3; flex: 1; word-break: break-word; }

    .score-wrap {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 0.3rem 0.55rem;
    }
    .priority-score {
      font-size: 1.65rem; font-weight: 700; line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .score-label {
      font-size: 0.5rem; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--text-3); text-align: right;
      margin-top: 1px;
    }

    .badges { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.65rem; }
    .badge {
      padding: 0.18rem 0.55rem; border-radius: 6px;
      font-size: 0.67rem; font-weight: 600; white-space: nowrap; line-height: 1.5;
    }
    .badge-cat {
      background: rgba(255,255,255,0.05); color: var(--text-2);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card-desc {
      font-size: 0.8rem; color: var(--text-2); line-height: 1.6; margin-bottom: 0.8rem; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Metrics row */
    .card-metrics { display: flex; gap: 0.6rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
    .cm { display: flex; align-items: center; gap: 0.3rem; flex: 1; min-width: 52px; }
    .cm-icon { font-size: 0.72rem; flex-shrink: 0; }
    .cm-bars { display: flex; gap: 2px; flex: 1; }
    .cm-bar {
      flex: 1; height: 5px; border-radius: 3px;
      background: rgba(255,255,255,0.07); transition: all .2s;
    }
    .cm-bar.on {
      background: var(--status-clr, var(--lime));
      opacity: 0.85;
      box-shadow: 0 0 4px color-mix(in srgb, var(--status-clr, var(--lime)) 60%, transparent);
    }

    /* Tech tags */
    .tech-tags { display: flex; gap: 0.28rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
    .tech-tag {
      padding: 0.12rem 0.48rem; border-radius: 5px;
      background: rgba(194,255,0,0.04); border: 1px solid rgba(194,255,0,0.12);
      font-size: 0.63rem; color: var(--text-3);
      font-family: 'Space Mono', monospace;
    }

    /* Card footer */
    .card-footer {
      border-top: 1px solid var(--border); padding-top: 0.7rem; margin-top: auto;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .card-meta { font-size: 0.67rem; color: var(--text-3); }
    .card-links { display: flex; gap: 0.5rem; }
    .card-links a {
      font-size: 0.67rem; color: var(--lime); opacity: .6;
      font-family: 'Space Mono', monospace;
      transition: opacity .15s;
    }
    .card-links a:hover { opacity: 1; }
    .card-actions { display: flex; gap: 0.3rem; margin-left: auto; }
    .btn-sm {
      background: var(--surface); border: 1px solid var(--border); color: var(--text-2);
      padding: 0.23rem 0.55rem; border-radius: 6px; font-family: inherit;
      font-size: 0.67rem; font-weight: 500; transition: all .12s;
    }
    .btn-sm:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
    .btn-sm.del:hover { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.35); color: #f87171; }

    /* ─── EMPTY STATE ─── */
    .empty { grid-column: 1 / -1; text-align: center; padding: 5rem 2rem; }
    .empty-glyph {
      font-size: 3.5rem; display: block; margin: 0 auto 1.2rem;
      width: 5rem; height: 5rem; line-height: 5rem; border-radius: 50%;
      background: var(--bg-2); border: 1px solid var(--border);
    }
    .empty h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.45rem; }
    .empty p { color: var(--text-2); font-size: 0.85rem; max-width: 28rem; margin: 0 auto; }

    /* ─── MODAL ─── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .overlay.hidden { display: none; }

    .modal {
      background: var(--bg-2); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; width: 100%; max-width: 600px;
      max-height: 92vh; overflow-y: auto; padding: 1.8rem; position: relative;
    }
    .modal::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--grad); border-radius: 20px 20px 0 0;
    }

    .modal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.4rem; }
    .modal-title {
      font-size: 1.15rem; font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .modal-close {
      background: var(--surface); border: 1px solid var(--border); color: var(--text-2);
      width: 1.85rem; height: 1.85rem; border-radius: 7px; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center; transition: all .12s;
    }
    .modal-close:hover { background: var(--surface2); color: var(--text); }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
    .fg { display: flex; flex-direction: column; gap: 0.3rem; }
    .fg.full { grid-column: 1 / -1; }
    .fg label {
      font-size: 0.63rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-3);
    }
    .fg input, .fg textarea, .fg select {
      background: var(--bg-3); border: 1px solid var(--border); color: var(--text);
      padding: 0.52rem 0.75rem; border-radius: 8px; font-family: inherit;
      font-size: 0.84rem; transition: border-color .15s; width: 100%;
    }
    .fg input:focus, .fg textarea:focus, .fg select:focus {
      outline: none; border-color: var(--lime);
      box-shadow: 0 0 0 3px rgba(194,255,0,.08);
    }
    .fg input::placeholder, .fg textarea::placeholder { color: var(--text-3); }
    .fg textarea { resize: vertical; min-height: 68px; }

    /* Metrics box */
    .metrics-box {
      grid-column: 1 / -1; background: var(--bg-3);
      border: 1px solid var(--border); border-radius: 12px; padding: 1rem;
    }
    .metrics-box-title {
      font-size: 0.63rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--text-3); margin-bottom: 0.9rem;
    }
    .metrics-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
    .metric-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .metric-field label { font-size: 0.72rem; font-weight: 600; color: var(--text-2); }

    /* Stars */
    .stars { display: flex; gap: 0.2rem; }
    .star {
      font-size: 1.2rem; cursor: pointer; opacity: .15;
      transition: transform .1s, opacity .1s; user-select: none; line-height: 1;
      color: var(--lime);
    }
    .star.lit { opacity: 1; }
    .star:hover { transform: scale(1.25); }

    /* Modal actions */
    .modal-actions { display: flex; gap: 0.7rem; justify-content: flex-end; margin-top: 1.3rem; }
    .btn-cancel {
      background: var(--surface); border: 1px solid var(--border); color: var(--text-2);
      padding: 0.58rem 1.2rem; border-radius: 8px; font-family: inherit;
      font-size: 0.84rem; transition: all .12s;
    }
    .btn-cancel:hover { background: var(--surface2); color: var(--text); }
    .btn-save {
      background: var(--grad); color: #000; border: none;
      padding: 0.58rem 1.4rem; border-radius: 8px; font-family: inherit;
      font-size: 0.84rem; font-weight: 700; transition: all .15s;
    }
    .btn-save:hover {
      opacity: .88;
      box-shadow: 0 4px 24px rgba(194,255,0,.2), 0 0 40px rgba(124,58,237,.2);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .header-inner { padding: 0.75rem 1rem; }
      .main { padding: 1rem 1rem 4rem; }
      .header-stats { gap: 0.35rem; }
      .stat-pill { padding: 0.28rem 0.6rem; font-size: 0.68rem; }
      .form-grid { grid-template-columns: 1fr; }
      .fg.full { grid-column: 1; }
      .metrics-form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo">✦ VIBE LAB 9000</div>
      <span class="logo-sub">project command center</span>
    </div>
    <div class="header-stats" id="header-stats"></div>
  </div>
</header>

<div class="main">
  <div class="toolbar">
    <button class="btn-primary" id="btn-add">＋ New Project</button>
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search projects…">
    </div>
    <div class="spacer"></div>
    <div class="sort-wrap">
      <label for="sort-select">Sort by</label>
      <select id="sort-select">
        <option value="priority-desc">Priority ↓</option>
        <option value="priority-asc">Priority ↑</option>
        <option value="name-asc">Name A→Z</option>
        <option value="name-desc">Name Z→A</option>
        <option value="date-desc">Date (newest)</option>
        <option value="date-asc">Date (oldest)</option>
        <option value="excitement-desc">Excitement ↓</option>
        <option value="passion-desc">Passion ↓</option>
        <option value="fun-desc">Fun ↓</option>
        <option value="impact-desc">Life Impact ↓</option>
        <option value="aifit-desc">AI Fit ↓</option>
      </select>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <button class="pill active" data-filter="status" data-value="all">All</button>
      <button class="pill" data-filter="status" data-value="frying-pan">🍳 Frying Pan</button>
      <button class="pill" data-filter="status" data-value="back-burner">🫕 Back Burner</button>
      <button class="pill" data-filter="status" data-value="marinating">🥩 Marinating</button>
      <button class="pill" data-filter="status" data-value="on-ice">❄️ On Ice</button>
      <button class="pill" data-filter="status" data-value="served">🚀 Served</button>
      <button class="pill" data-filter="status" data-value="scrapped">🗑️ Scrapped</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">Type</span>
      <button class="pill active" data-filter="category" data-value="all">All</button>
      <button class="pill" data-filter="category" data-value="game">🎮 Game</button>
      <button class="pill" data-filter="category" data-value="productivity">⚙️ Productivity</button>
      <button class="pill" data-filter="category" data-value="art">🎨 Art</button>
      <button class="pill" data-filter="category" data-value="tool">🛠️ Tool</button>
      <button class="pill" data-filter="category" data-value="other">💡 Other</button>
    </div>
  </div>

  <div class="results-count" id="results-count"></div>
  <div class="grid" id="project-grid"></div>
</div>

<!-- Modal -->
<div class="overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="modal-title">New Project</div>
      <button class="modal-close" id="modal-close" type="button">✕</button>
    </div>
    <form id="project-form">
      <input type="hidden" id="field-id">
      <div class="form-grid">

        <div class="fg full">
          <label>Project Name *</label>
          <input type="text" id="field-name" placeholder="My killer app" required>
        </div>

        <div class="fg">
          <label>Status</label>
          <select id="field-status">
            <option value="marinating">🥩 Marinating — still an idea</option>
            <option value="frying-pan">🍳 Frying Pan — actively cooking</option>
            <option value="back-burner">🫕 Back Burner — simmering</option>
            <option value="on-ice">❄️ On Ice — paused</option>
            <option value="served">🚀 Served — shipped!</option>
            <option value="scrapped">🗑️ Scrapped — RIP</option>
          </select>
        </div>

        <div class="fg">
          <label>Category</label>
          <select id="field-category">
            <option value="game">🎮 Game</option>
            <option value="productivity">⚙️ Productivity</option>
            <option value="art">🎨 Art</option>
            <option value="tool">🛠️ Tool</option>
            <option value="other">💡 Other</option>
          </select>
        </div>

        <div class="fg full">
          <label>Description</label>
          <textarea id="field-desc" placeholder="What's the vibe? What does it do?"></textarea>
        </div>

        <div class="fg">
          <label>Repo URL</label>
          <input type="url" id="field-repo" placeholder="https://github.com/…">
        </div>

        <div class="fg">
          <label>Live URL</label>
          <input type="url" id="field-url" placeholder="https://…">
        </div>

        <div class="fg full">
          <label>Tech Stack (comma-separated)</label>
          <input type="text" id="field-tech" placeholder="React, Supabase, Tailwind…">
        </div>

        <div class="fg">
          <label>Date Started</label>
          <input type="date" id="field-date">
        </div>

        <div class="fg full">
          <label>Notes</label>
          <textarea id="field-notes" placeholder="Loose thoughts, links, blockers, next steps…" style="min-height:56px"></textarea>
        </div>

        <!-- Vibe Metrics -->
        <div class="metrics-box full">
          <div class="metrics-box-title">✦ Vibe Metrics — tap to rate 1–5</div>
          <div class="metrics-form-grid">
            <div class="metric-field">
              <label>💥 Life Impact</label>
              <div class="stars" data-field="impact">
                <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span>
                <span class="star" data-val="3">★</span><span class="star" data-val="4">★</span>
                <span class="star" data-val="5">★</span>
              </div>
            </div>
            <div class="metric-field">
              <label>🤖 AI Alignment</label>
              <div class="stars" data-field="aifit">
                <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span>
                <span class="star" data-val="3">★</span><span class="star" data-val="4">★</span>
                <span class="star" data-val="5">★</span>
              </div>
            </div>
            <div class="metric-field">
              <label>⚡ Excitement</label>
              <div class="stars" data-field="excitement">
                <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span>
                <span class="star" data-val="3">★</span><span class="star" data-val="4">★</span>
                <span class="star" data-val="5">★</span>
              </div>
            </div>
            <div class="metric-field">
              <label>❤️ Passion</label>
              <div class="stars" data-field="passion">
                <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span>
                <span class="star" data-val="3">★</span><span class="star" data-val="4">★</span>
                <span class="star" data-val="5">★</span>
              </div>
            </div>
            <div class="metric-field">
              <label>🎉 Fun Factor</label>
              <div class="stars" data-field="fun">
                <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span>
                <span class="star" data-val="3">★</span><span class="star" data-val="4">★</span>
                <span class="star" data-val="5">★</span>
              </div>
            </div>
          </div>
        </div>

      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
        <button type="submit" class="btn-save">Save Project</button>
      </div>
    </form>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const STORAGE_KEY = 'vibelab_v1';

const STATUS_META = {
  'frying-pan':  { label: '🍳 Frying Pan',  color: '#ff6b35' },
  'back-burner': { label: '🫕 Back Burner', color: '#ffd60a' },
  'marinating':  { label: '🥩 Marinating',  color: '#c084fc' },
  'on-ice':      { label: '❄️ On Ice',      color: '#22d3ee' },
  'served':      { label: '🚀 Served',      color: '#4ade80' },
  'scrapped':    { label: '🗑️ Scrapped',    color: '#52526a' },
};

const CAT_META = {
  'game':         '🎮 Game',
  'productivity': '⚙️ Productivity',
  'art':          '🎨 Art',
  'tool':         '🛠️ Tool',
  'other':        '💡 Other',
};

const METRICS = [
  { key: 'impact',     icon: '💥' },
  { key: 'aifit',      icon: '🤖' },
  { key: 'excitement', icon: '⚡' },
  { key: 'passion',    icon: '❤️' },
  { key: 'fun',        icon: '🎉' },
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let projects = [];
let filterStatus   = 'all';
let filterCategory = 'all';
let searchQuery    = '';
let sortBy         = 'priority-desc';
let starValues     = {};

// ─────────────────────────────────────────────
//  STORAGE
// ─────────────────────────────────────────────
function loadProjects() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    projects = raw ? JSON.parse(raw) : seedData();
  } catch (e) {
    projects = seedData();
  }
}

function saveProjects() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
}

function seedData() {
  return [
    {
      id: uid(), name: 'Vibe Lab 9000',
      description: 'A command center for tracking all my vibecode projects. Meta, but absolutely necessary.',
      status: 'frying-pan', category: 'productivity',
      repoUrl: '', liveUrl: '', techStack: ['HTML', 'CSS', 'JS'],
      notes: 'This very app!', dateStarted: todayStr(),
      impact: 4, aifit: 5, excitement: 5, passion: 4, fun: 5,
      createdAt: new Date().toISOString(),
    },
    {
      id: uid(), name: 'Dream Platformer',
      description: 'A surreal 2D platformer with procedurally generated dreamscapes. Yume Nikki meets Celeste.',
      status: 'marinating', category: 'game',
      repoUrl: '', liveUrl: '', techStack: ['Godot', 'GDScript'],
      notes: 'Need to learn Godot first lol', dateStarted: '',
      impact: 3, aifit: 3, excitement: 5, passion: 5, fun: 5,
      createdAt: new Date().toISOString(),
    },
    {
      id: uid(), name: 'AutoJournal',
      description: 'AI-powered journaling tool that synthesizes your notes into weekly insights and trends.',
      status: 'back-burner', category: 'productivity',
      repoUrl: '', liveUrl: '', techStack: ['Next.js', 'Claude API', 'Supabase'],
      notes: '', dateStarted: '2024-11-01',
      impact: 5, aifit: 5, excitement: 4, passion: 3, fun: 3,
      createdAt: new Date().toISOString(),
    },
    {
      id: uid(), name: 'Pixel Garden',
      description: 'A generative art piece that grows a new pixel garden every day based on the weather.',
      status: 'on-ice', category: 'art',
      repoUrl: '', liveUrl: '', techStack: ['p5.js', 'Weather API'],
      notes: 'Blocked on finding a free reliable weather API', dateStarted: '2024-09-15',
      impact: 2, aifit: 4, excitement: 4, passion: 4, fun: 5,
      createdAt: new Date().toISOString(),
    },
  ];
}

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function uid() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function priorityScore(p) {
  const vals = METRICS.map(m => p[m.key] || 0);
  const filled = vals.filter(v => v > 0).length;
  if (!filled) return null;
  const avg = vals.reduce((a, b) => a + b, 0) / filled;
  return Math.round(avg * 2 * 10) / 10;
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderAll() {
  renderStats();
  renderGrid();
}

function renderStats() {
  const active  = projects.filter(p => p.status === 'frying-pan').length;
  const ideas   = projects.filter(p => p.status === 'marinating').length;
  const shipped = projects.filter(p => p.status === 'served').length;
  document.getElementById('header-stats').innerHTML = `
    <div class="stat-pill"><strong>${projects.length}</strong> total</div>
    <div class="stat-pill">🍳 <strong>${active}</strong> active</div>
    <div class="stat-pill">🥩 <strong>${ideas}</strong> ideas</div>
    <div class="stat-pill">🚀 <strong>${shipped}</strong> shipped</div>
  `;
}

function getFiltered() {
  let list = [...projects];

  if (filterStatus !== 'all')   list = list.filter(p => p.status === filterStatus);
  if (filterCategory !== 'all') list = list.filter(p => p.category === filterCategory);

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.description || '').toLowerCase().includes(q) ||
      (p.notes || '').toLowerCase().includes(q) ||
      (p.techStack || []).some(t => t.toLowerCase().includes(q))
    );
  }

  const [field, dir] = sortBy.split('-');
  const asc = dir === 'asc';

  list.sort((a, b) => {
    let av, bv;
    if      (field === 'priority') { av = priorityScore(a) ?? -1; bv = priorityScore(b) ?? -1; }
    else if (field === 'name')     { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
    else if (field === 'date')     { av = a.dateStarted || ''; bv = b.dateStarted || ''; }
    else if (METRICS.find(m => m.key === field)) { av = a[field] || 0; bv = b[field] || 0; }
    else { av = 0; bv = 0; }
    if (av < bv) return asc ? -1 : 1;
    if (av > bv) return asc ? 1 : -1;
    return 0;
  });

  return list;
}

function renderGrid() {
  const list  = getFiltered();
  const grid  = document.getElementById('project-grid');
  const count = document.getElementById('results-count');

  count.textContent = list.length !== projects.length
    ? `Showing ${list.length} of ${projects.length} projects`
    : `${projects.length} project${projects.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty">
        <span class="empty-glyph">🧪</span>
        <h2>${projects.length ? 'Nothing matches' : 'The lab is empty'}</h2>
        <p>${projects.length
          ? 'Try loosening your filters or search terms.'
          : 'You have projects brewing in your brain. Get them in here.'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(cardHTML).join('');

  grid.querySelectorAll('[data-edit]').forEach(btn =>
    btn.addEventListener('click', () => openModal(btn.dataset.edit))
  );
  grid.querySelectorAll('[data-del]').forEach(btn =>
    btn.addEventListener('click', () => deleteProject(btn.dataset.del))
  );
}

function cardHTML(p) {
  const sm       = STATUS_META[p.status] || STATUS_META['marinating'];
  const score    = priorityScore(p);
  const scoreStr = score !== null ? score.toFixed(1) : '—';

  // Badge: colored tint matching status
  const hex   = sm.color;
  const statusBadge = `<span class="badge" style="background:${hex}18;color:${hex};border:1px solid ${hex}30">${sm.label}</span>`;
  const catBadge    = `<span class="badge badge-cat">${CAT_META[p.category] || CAT_META.other}</span>`;

  const metricBars = METRICS.map(m => {
    const val  = p[m.key] || 0;
    const bars = [1,2,3,4,5].map(i => `<div class="cm-bar${i <= val ? ' on' : ''}"></div>`).join('');
    return `<div class="cm"><span class="cm-icon">${m.icon}</span><div class="cm-bars">${bars}</div></div>`;
  }).join('');

  const tags = (p.techStack || []).length
    ? `<div class="tech-tags">${p.techStack.map(t => `<span class="tech-tag">${escHtml(t)}</span>`).join('')}</div>`
    : '';

  const links = [];
  if (p.repoUrl) links.push(`<a href="${escHtml(p.repoUrl)}" target="_blank" rel="noopener">repo ↗</a>`);
  if (p.liveUrl) links.push(`<a href="${escHtml(p.liveUrl)}" target="_blank" rel="noopener">live ↗</a>`);
  const linksHTML = links.length ? `<div class="card-links">${links.join('')}</div>` : '';

  return `
    <div class="card" style="--status-clr:${sm.color}">
      <div class="card-top">
        <div class="card-title">${escHtml(p.name)}</div>
        <div class="score-wrap">
          <div class="priority-score">${scoreStr}</div>
          <div class="score-label">vibe</div>
        </div>
      </div>
      <div class="badges">${statusBadge}${catBadge}</div>
      ${p.description ? `<div class="card-desc">${escHtml(p.description)}</div>` : ''}
      <div class="card-metrics">${metricBars}</div>
      ${tags}
      ${linksHTML}
      <div class="card-footer">
        <div class="card-meta">${p.dateStarted ? '📅 ' + fmtDate(p.dateStarted) : ''}</div>
        <div class="card-actions">
          <button class="btn-sm" data-edit="${p.id}">Edit</button>
          <button class="btn-sm del" data-del="${p.id}">Delete</button>
        </div>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(id) {
  document.getElementById('project-form').reset();
  resetStars();
  document.getElementById('modal-title').textContent = id ? 'Edit Project' : 'New Project';
  document.getElementById('field-id').value = id || '';

  if (id) {
    const p = projects.find(x => x.id === id);
    if (p) {
      document.getElementById('field-name').value     = p.name || '';
      document.getElementById('field-status').value   = p.status || 'marinating';
      document.getElementById('field-category').value = p.category || 'other';
      document.getElementById('field-desc').value     = p.description || '';
      document.getElementById('field-repo').value     = p.repoUrl || '';
      document.getElementById('field-url').value      = p.liveUrl || '';
      document.getElementById('field-tech').value     = (p.techStack || []).join(', ');
      document.getElementById('field-date').value     = p.dateStarted || '';
      document.getElementById('field-notes').value    = p.notes || '';
      METRICS.forEach(m => setStars(m.key, p[m.key] || 0));
    }
  }

  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('field-name').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

// ─────────────────────────────────────────────
//  STARS
// ─────────────────────────────────────────────
function resetStars() {
  METRICS.forEach(m => { starValues[m.key] = 0; setStars(m.key, 0); });
}

function setStars(field, val) {
  starValues[field] = val;
  const container = document.querySelector(`.stars[data-field="${field}"]`);
  if (!container) return;
  container.querySelectorAll('.star').forEach(s =>
    s.classList.toggle('lit', parseInt(s.dataset.val) <= val)
  );
}

// ─────────────────────────────────────────────
//  SAVE / DELETE
// ─────────────────────────────────────────────
function handleSubmit(e) {
  e.preventDefault();
  const id      = document.getElementById('field-id').value;
  const techRaw = document.getElementById('field-tech').value;

  const data = {
    name:        document.getElementById('field-name').value.trim(),
    status:      document.getElementById('field-status').value,
    category:    document.getElementById('field-category').value,
    description: document.getElementById('field-desc').value.trim(),
    repoUrl:     document.getElementById('field-repo').value.trim(),
    liveUrl:     document.getElementById('field-url').value.trim(),
    techStack:   techRaw.split(',').map(t => t.trim()).filter(Boolean),
    dateStarted: document.getElementById('field-date').value,
    notes:       document.getElementById('field-notes').value.trim(),
    impact:      starValues.impact     || 0,
    aifit:       starValues.aifit      || 0,
    excitement:  starValues.excitement || 0,
    passion:     starValues.passion    || 0,
    fun:         starValues.fun        || 0,
  };

  if (id) {
    const idx = projects.findIndex(p => p.id === id);
    if (idx >= 0) projects[idx] = { ...projects[idx], ...data, updatedAt: new Date().toISOString() };
  } else {
    projects.unshift({ id: uid(), ...data, createdAt: new Date().toISOString() });
  }

  saveProjects();
  closeModal();
  renderAll();
}

function deleteProject(id) {
  if (!confirm('Delete this project? This cannot be undone.')) return;
  projects = projects.filter(p => p.id !== id);
  saveProjects();
  renderAll();
}

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', () => openModal());
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('project-form').addEventListener('submit', handleSubmit);

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

document.getElementById('sort-select').addEventListener('change', e => {
  sortBy = e.target.value;
  renderGrid();
});

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const { filter, value } = pill.dataset;
    if (filter === 'status') {
      filterStatus = value;
      document.querySelectorAll('[data-filter="status"]').forEach(p => p.classList.remove('active'));
    } else {
      filterCategory = value;
      document.querySelectorAll('[data-filter="category"]').forEach(p => p.classList.remove('active'));
    }
    pill.classList.add('active');
    renderGrid();
  });
});

document.querySelectorAll('.stars').forEach(container => {
  const field = container.dataset.field;
  container.querySelectorAll('.star').forEach(star => {
    star.addEventListener('click', () => {
      const val    = parseInt(star.dataset.val);
      const newVal = starValues[field] === val ? 0 : val;
      setStars(field, newVal);
    });
    star.addEventListener('mouseenter', () => {
      const val = parseInt(star.dataset.val);
      container.querySelectorAll('.star').forEach(s =>
        s.classList.toggle('lit', parseInt(s.dataset.val) <= val)
      );
    });
    star.addEventListener('mouseleave', () => {
      setStars(field, starValues[field] || 0);
    });
  });
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
loadProjects();
renderAll();
</script>
</body>
</html>
